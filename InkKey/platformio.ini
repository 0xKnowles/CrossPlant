; InkKey — air-gapped TOTP authenticator firmware for the Xteink X3.
;
; X3 ONLY: the build links the UC8253/X3 panel driver and relies on the X3's
; DS3231 RTC for offline timekeeping. There is deliberately no X4 target — the
; X4 has no battery-backed RTC, which this firmware's security model requires.
;
; The binary contains no WiFi or Bluetooth code: nothing in src/ or the
; vendored FreeInk libraries initializes a radio.

[platformio]
default_envs = xteink_x3

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
  -std=gnu++2a
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  ; Single framebuffer: the panel controller's RAM holds the previous frame.
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1

build_unflags =
  -std=gnu++11

board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

lib_deps =
  BoardConfig=symlink://freeink-sdk/libs/hardware/BoardConfig
  EInkDisplay=symlink://freeink-sdk/libs/display/FreeInkDisplay
  InputManager=symlink://freeink-sdk/libs/hardware/InputManager
  BatteryMonitor=symlink://freeink-sdk/libs/hardware/BatteryMonitor
  Rtc=symlink://freeink-sdk/libs/hardware/Rtc
  FreeInkUI=symlink://freeink-sdk/libs/ui/FreeInkUI

[env:xteink_x3]
extends = base
board = esp32-c3-devkitm-1
build_flags =
  ${base.build_flags}
  -DFREEINK_DEVICE_X3=1
