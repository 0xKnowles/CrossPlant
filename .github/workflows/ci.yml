name: CI (build)

# Builds the firmware for the real ESP32-C3 targets on GitHub-hosted runners.
# GitHub-hosted runners have unrestricted network access, so the pioarduino
# toolchain (fetched from a GitHub release) installs cleanly here even when a
# locked-down local environment cannot fetch it.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [tiny, xlarge]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install pioarduino PlatformIO Core
        run: pip install -U https://github.com/pioarduino/platformio-core/archive/refs/tags/v6.1.19.zip

      # platformio.ini pulls in a per-developer override via `extra_configs`;
      # create an empty one so the config parses in CI.
      - name: Create empty platformio.local.ini
        run: touch platformio.local.ini

      - name: Build ${{ matrix.environment }}
        run: pio run -e ${{ matrix.environment }} | tee pio.log

      - name: Firmware size summary
        if: always()
        run: |
          {
            echo "## ${{ matrix.environment }} build stats"
            grep -E "RAM:\s|Flash:\s" pio.log | while read -r line; do echo "- ${line}"; done
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.environment }}
          path: .pio/build/${{ matrix.environment }}/*.bin
          if-no-files-found: warn
